name: Prewarm Sitemap After Deploy

# Triggered by Vercel via a repository_dispatch event.
# In Vercel: Settings → Git → Deploy Hooks → create a hook named "prewarm-sitemap"
# targeting this branch. Vercel calls it automatically after each successful deployment.
#
# Alternatively, trigger manually: Actions → Prewarm Sitemap After Deploy → Run workflow
on:
  repository_dispatch:
    types: [vercel-deploy-complete]
  workflow_dispatch:

# This workflow always warms the production sitemap URL.
# It is not intended for preview deployments — preview URLs are ephemeral
# and do not benefit from CDN warming.

jobs:
  prewarm:
    name: Warm ISR sitemap cache
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wait for Vercel edge propagation
        # Give Vercel 30s to propagate the new deployment to all edge nodes
        # before we hit the sitemap endpoint.
        run: sleep 30

      - name: Warm sitemap (production)
        # Hitting the sitemap URL causes Vercel to run the ISR route handler,
        # generate the full sitemap from WordPress, and cache it on the CDN.
        # Every subsequent request — including the first real user or crawler —
        # is served from CDN (<10ms) with no cold-start latency.
        run: |
          echo "Warming https://keploy.io/blog/sitemap.xml ..."
          HTTP_STATUS=$(curl -s -o /tmp/sitemap-response.xml \
            -w "%{http_code}" \
            --max-time 120 \
            "https://keploy.io/blog/sitemap.xml")

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "200" ]; then
            URL_COUNT=$(grep -c "<loc>" /tmp/sitemap-response.xml || echo 0)
            echo "Sitemap warmed successfully — $URL_COUNT URLs"
          else
            echo "Sitemap warm attempt returned HTTP $HTTP_STATUS (ISR fallback may be active)"
            echo "WordPress may be temporarily unavailable. Vercel will serve"
            echo "the previous cached version to crawlers. Will auto-recover on next ISR cycle."
            # Do NOT fail the workflow — a 503 is expected if WordPress is briefly down.
            # The ISR fallback is the safety net; this job is best-effort warming only.
          fi
